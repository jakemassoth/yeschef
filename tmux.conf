# yeschef-owned tmux configuration.
#
# This is NOT the user's ~/.tmux.conf. yeschef writes it to <home>/tmux.conf
# and launches every session with `tmux -f <this file>` on a dedicated `-L`
# socket, so yeschef's terminal sessions run on a private tmux server that is
# fully isolated from the user's own server and never reads or clobbers their
# ~/.tmux.conf.

# A modern TERM inside sessions (truecolor, italics). Present in the ncurses
# terminfo shipped alongside the wrapped binary and on modern macOS/Linux.
set -g default-terminal "tmux-256color"

# The whole reason yeschef ships its own config: forward extended keys
# (CSI-u / modifyOtherKeys) to the running agent so Claude Code sees Shift+Enter
# as a distinct key and inserts a newline instead of submitting the prompt.
# `extended-keys on` forwards them to apps that request them; the
# terminal-features line advertises `extkeys` so tmux enables the sequence on
# the outer terminal. (The outer terminal must itself support CSI-u — iTerm2,
# Ghostty, kitty, WezTerm, the VS Code terminal all do.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Deep scrollback so `capture-pane -S -` (peek and the TUI's live preview) has
# the full session history to replay, not just the last visible screen.
set -g history-limit 50000
