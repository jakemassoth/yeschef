# yeschef-owned tmux configuration.
#
# This is NOT the user's ~/.tmux.conf. yeschef writes it to <home>/tmux.conf
# and launches every session with `tmux -f <this file>` on a dedicated `-L`
# socket, so yeschef's terminal sessions run on a private tmux server that is
# fully isolated from the user's own server and never reads or clobbers their
# ~/.tmux.conf.

# A modern TERM inside sessions (truecolor, italics). Present in the ncurses
# terminfo shipped alongside the wrapped binary and on modern macOS/Linux.
set -g default-terminal "tmux-256color"

# The whole reason yeschef ships its own config: forward extended keys
# (CSI-u / modifyOtherKeys) to the running agent so Claude Code sees Shift+Enter
# as a distinct key and inserts a newline instead of submitting the prompt.
# `extended-keys on` forwards them to apps that request them; the
# terminal-features line advertises `extkeys` so tmux enables the sequence on
# the outer terminal. (The outer terminal must itself support CSI-u — iTerm2,
# Ghostty, kitty, WezTerm, the VS Code terminal all do.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Deep scrollback so `capture-pane -S -` (peek and `status`'s last-line probe)
# has the full session history, not just the last visible screen.
set -g history-limit 50000

# ---------------------------------------------------------------------------
# The brigade view: tmux's status line IS the yeschef TUI.
# ---------------------------------------------------------------------------
#
# The whole brigade lives in one `yeschef` session: the head chef at window 0
# and one window per line cook. `yeschef tui` just attaches, so this status-bar
# config is the entire UI — one colour-coded tab per cook, no custom rendering.

# A clean, dark status bar (tmux's stock bar is green — override it).
set -g status on
set -g status-interval 2
set -g status-style "bg=colour235,fg=colour250"
set -g status-justify left
set -g status-left "#[fg=black,bg=magenta,bold] yeschef #[fg=magenta,bg=colour235]#[default]  "
set -g status-left-length 20
# The two keystrokes that matter. When many cooks overflow the bar, tmux shows
# `<`/`>` scroll markers; `prefix+w` opens the full searchable tree.
set -g status-right "#[fg=colour244] prefix+w · prefix+d detach "
set -g status-right-length 32

# Cook windows never auto-rename from the running process: the window name is
# yeschef's stable ticket id (<project>-<branch>) and doubles as the
# send/peek/kill target, so it must not drift.
set -g allow-rename off
set -wg automatic-rename off

# Keep window indices gap-free. When any window closes — a cook killed, or its
# agent exiting (tmux drops the window on process exit) — renumber the survivors
# so the head chef stays at window 0 and the cooks stay 1, 2, 3… with no holes.
# Without this, closing a middle cook leaves a gap (0, 2, 3…) and `prefix+<n>`
# no longer lands on the nth cook — the whole point of the tab bar's numbering.
# yeschef addresses windows by *name* (yeschef:<window>), never by index, so
# renumbering is invisible to send/peek/kill; it only fixes the human's tab
# order and `prefix+<n>` navigation.
set -g renumber-windows on

# Each tab's glyph + colour is driven by the per-window `@status` user option,
# which yeschef sets on every `ticket ... status-set` (and tags window 0 CHEF):
#   tmux set-window-option -t yeschef:<window> @status <STATUS>
# The tab bar re-renders live from it — no polling. `#{?#{==:#{@status},X},..}`
# is tmux's own conditional/compare format (no external process).
#   CHEF ★ magenta · IN_PROGRESS ● yellow · DONE ✓ green · BLOCKED ■ red · NEW ○ grey
set -g @glyph "#{?#{==:#{@status},CHEF},#[fg=magenta bold]★,#{?#{==:#{@status},DONE},#[fg=green]✓,#{?#{==:#{@status},BLOCKED},#[fg=red]■,#{?#{==:#{@status},IN_PROGRESS},#[fg=yellow]●,#[fg=colour244]○}}}}"
set -g window-status-format "  #{E:@glyph} #[fg=colour250]#{window_name}  "
set -g window-status-current-format "#[bg=colour238]  #{E:@glyph} #[fg=white,bold]#{window_name}#[nobold]  #[default]"
set -g window-status-separator ""

# Head chef is always window 0, so "back to the head chef" is one keystroke:
# prefix+0, plus a `prefix+c` alias (mnemonic: chef).
bind c select-window -t :0
