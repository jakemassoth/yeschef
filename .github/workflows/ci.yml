name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: nix flake check + e2e
    # Runs on Linux (x86_64-linux). The only thing that ever tied CI to macOS
    # was the old zmx dependency (Apple-SDK-coupled); tmux comes from nixpkgs
    # and is fully cross-platform, and the suite has no macOS-specific behaviour,
    # so the cheaper/faster ubuntu runner is the right home now.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      # Sandboxed CI suite: fmt (rustfmt), nixfmt, lint (clippy), test (unit).
      - name: nix flake check
        run: nix flake check -L

      # The e2e suite is intentionally NOT a sandboxed flake check: it drives
      # REAL tmux sessions and REAL git worktrees, sharing the global `yeschef`
      # tmux server (a private `-L` socket) and spawning detached sessions. Run
      # it un-sandboxed here.
      - name: e2e
        run: nix run .#e2e
