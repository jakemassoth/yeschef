name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: nix flake check + e2e
    # Runs on Linux (x86_64-linux). herdr comes from its own pinned flake and is
    # cross-platform, and the suite has no macOS-specific behaviour, so the
    # cheaper/faster ubuntu runner is the right home.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      # Sandboxed CI suite: fmt (rustfmt), nixfmt, lint (clippy), test (unit).
      - name: nix flake check
        run: nix flake check -L

      # The e2e suite is intentionally NOT a sandboxed flake check: it drives a
      # REAL herdr server and REAL git worktrees on a throwaway per-test session,
      # spawning a detached server. Run it un-sandboxed here (`nix run .#e2e`
      # puts git + herdr on PATH).
      - name: e2e
        run: nix run .#e2e
