# yeschef TUI-replacement spike — proof-of-concept tmux config.
#
# This is what yeschef's shipped `src/../tmux.conf` would grow into if we adopt
# the "native tmux TUI" recommendation (see ../tui-replacement.md). It is the
# existing yeschef config PLUS a status-bar (tab-bar) format that turns tmux's
# own window list into the brigade view: one tab per line cook, colour-coded by
# each cook's self-reported status.
#
# Load it exactly like yeschef loads its real config — on a private server:
#   tmux -L <socket> -f tui-native.tmux.conf ...

# ---- carried over verbatim from yeschef's real tmux.conf --------------------
set -g default-terminal "tmux-256color"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g history-limit 50000

# ---- the TUI: tmux's status line IS the brigade tab-bar ----------------------

# A clean, dark status bar (tmux's stock bar is green — override it). This is
# the strip that becomes the brigade view.
set -g status on
set -g status-interval 2
set -g status-style "bg=colour235,fg=colour250"
set -g status-justify left

# Left: a fixed "you're in the yeschef kitchen" marker.
set -g status-left "#[fg=black,bg=magenta,bold] yeschef #[fg=magenta,bg=colour235]#[default]  "
set -g status-left-length 20

# Right: the two keystrokes that matter. (When many cooks overflow the bar,
# tmux shows `<`/`>` scroll markers; `prefix+w` opens the full tree — see the
# scaling note in ../tui-replacement.md.)
set -g status-right "#[fg=colour244] prefix+w · prefix+d detach "
set -g status-right-length 32

# Line cooks never auto-rename their window from the running process — the
# window name is yeschef's stable ticket id (<project>-<branch>) and doubles as
# the send/peek/kill target, so it must not drift.
set -g allow-rename off
set -wg automatic-rename off

# The brigade tab. The window NAME is the stable ticket id (the target); the
# per-window user option `@status` carries the cook's self-reported task status
# and drives the glyph + colour. yeschef sets it with:
#   tmux set-window-option -t yeschef:<window> @status <STATUS>
# on every `ticket ... status-set`, and the tab-bar updates live — no polling,
# no custom rendering. Head chef (window 0) is tagged @status CHEF.
#
# glyph/colour: CHEF ★ magenta · IN_PROGRESS ● yellow · DONE ✓ green ·
#               BLOCKED ■ red · anything else (NEW) ○ grey
#
# `#{?#{==:#{@status},X},then,else}` is tmux's own conditional/compare format —
# no external process, evaluated every status-interval and on every event.
set -g @glyph "#{?#{==:#{@status},CHEF},#[fg=magenta bold]★,#{?#{==:#{@status},DONE},#[fg=green]✓,#{?#{==:#{@status},BLOCKED},#[fg=red]■,#{?#{==:#{@status},IN_PROGRESS},#[fg=yellow]●,#[fg=colour244]○}}}}"
set -g window-status-format "  #{E:@glyph} #[fg=colour250]#{window_name}  "
set -g window-status-current-format "#[bg=colour238]  #{E:@glyph} #[fg=white,bold]#{window_name}#[nobold]  #[default]"
set -g window-status-separator ""

# Head chef is always window 0, so "back to the head chef" is one keystroke:
# prefix+0. Bind an even quicker jump on prefix+c (mnemonic: chef).
bind c select-window -t :0
